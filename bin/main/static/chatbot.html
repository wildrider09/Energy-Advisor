<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedrock Chatbot</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#f0f4f8;height:100vh;display:flex;flex-direction:column}
        .header{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:1rem 1.5rem;color:#fff;display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:1.3rem;font-weight:700}
        .header span{font-size:.75rem;opacity:.8}
        .header a{color:#fff;text-decoration:none;background:rgba(255,255,255,.2);padding:.3rem .8rem;border-radius:8px;font-size:.8rem}
        .messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:.8rem}
        .msg{display:flex;gap:.6rem;max-width:80%;animation:fadeIn .3s ease}
        .msg.user{align-self:flex-end;flex-direction:row-reverse}
        .avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
        .msg.bot .avatar{background:linear-gradient(135deg,#ede9fe,#ddd6fe)}
        .msg.user .avatar{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:.8rem}
        .bubble{padding:.7rem 1rem;border-radius:14px;font-size:.9rem;line-height:1.6;box-shadow:0 1px 3px rgba(0,0,0,.06);white-space:pre-wrap}
        .msg.bot .bubble{background:#fff;border:1px solid #e2e8f0;border-top-left-radius:4px}
        .msg.user .bubble{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-top-right-radius:4px}
        .typing{display:flex;gap:.6rem;align-items:center;color:#64748b;font-size:.85rem}
        .typing .dots{display:inline-flex;gap:3px}
        .typing .dots span{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:bounce .6s infinite}
        .typing .dots span:nth-child(2){animation-delay:.15s}
        .typing .dots span:nth-child(3){animation-delay:.3s}
        .input-area{padding:1rem 1.5rem;background:#fff;border-top:1px solid #e2e8f0;box-shadow:0 -2px 10px rgba(0,0,0,.03)}
        .suggestions{display:flex;gap:.4rem;margin-bottom:.6rem;flex-wrap:wrap}
        .suggestions button{padding:.3rem .7rem;border:1px solid #e2e8f0;background:#fff;color:#1e293b;border-radius:20px;cursor:pointer;font-size:.75rem;transition:all .2s}
        .suggestions button:hover{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-color:transparent}
        .input-row{display:flex;gap:.5rem}
        .input-row input{flex:1;padding:.7rem 1rem;border:2px solid #e2e8f0;border-radius:12px;font-size:.9rem;outline:none;transition:border .2s}
        .input-row input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
        .input-row button{padding:.7rem 1.2rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center}
        .input-row button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.3)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🤖 Bedrock Chatbot</h1>
            <span>Direct conversation with Claude Sonnet 4.5 on Amazon Bedrock</span>
        </div>
        <a href="/">← Back to Dashboard</a>
    </div>
    <div class="messages" id="messages">
        <div class="msg bot">
            <div class="avatar">🤖</div>
            <div class="bubble">Hi! I'm connected directly to Claude Sonnet 4.5 on Amazon Bedrock. Ask me anything about smart home energy, HVAC systems, thermostats, or energy efficiency!</div>
        </div>
    </div>
    <div class="input-area">
        <div class="suggestions">
            <button onclick="ask('What is a demand response event?')">⚡ What is DR?</button>
            <button onclick="ask('How does a heat pump work?')">🔥 Heat pumps</button>
            <button onclick="ask('Tips to reduce my energy bill')">💰 Save money</button>
            <button onclick="ask('What is PRISM clean energy optimization?')">🌍 PRISM</button>
            <button onclick="ask('How often should I change my HVAC filter?')">🔧 Filter tips</button>
            <button onclick="ask('What temperature should I set my thermostat to?')">🌡️ Best temp</button>
            <button onclick="ask('Explain time-of-use electricity pricing')">⏰ TOU pricing</button>
            <button onclick="ask('How does weather affect HVAC efficiency?')">☀️ Weather</button>
        </div>
        <div class="input-row">
            <input type="text" id="input" placeholder="Ask anything about energy, HVAC, or smart home..." onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </button>
        </div>
    </div>
    <script>
        const msgs = document.getElementById('messages');
        function addMsg(type, text) {
            const d = document.createElement('div'); d.className = 'msg ' + type;
            const av = document.createElement('div'); av.className = 'avatar';
            av.textContent = type === 'user' ? '👤' : '🤖';
            const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
            d.appendChild(av); d.appendChild(b); msgs.appendChild(d);
            msgs.scrollTop = msgs.scrollHeight;
        }
        function showTyping() {
            const d = document.createElement('div'); d.className = 'typing'; d.id = 'typing';
            d.innerHTML = '<div class="avatar" style="background:linear-gradient(135deg,#ede9fe,#ddd6fe)">🤖</div><div><div class="dots"><span></span><span></span><span></span></div> Thinking...</div>';
            msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
        }
        function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
        function ask(q) { document.getElementById('input').value = q; send(); }
        async function send() {
            const inp = document.getElementById('input');
            const msg = inp.value.trim(); if (!msg) return;
            inp.value = ''; addMsg('user', msg); showTyping();
            try {
                const res = await fetch('/api/chatbot', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json(); hideTyping();
                addMsg('bot', data.response);
            } catch(e) { hideTyping(); addMsg('bot', 'Error connecting to Bedrock. Check if credentials are valid.'); }
        }
    </script>
</body>
</html>
